<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Loading 2400x1080 Centered</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
  }
  body {
    font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  }

  .stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100dvh;
    background: #000;
    overflow: hidden;
  }

  .canvas {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2400px;
    height: 1080px;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(min(calc(100vw / 2400), calc(100dvh / 1080)));
  }

  /* 2400x1080 设计稿内，loading 保持画面正中间 */
  .wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 240px;
    height: 267px;
    transform: translate3d(-50%, -50%, 0);
  }

  .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    user-select: none;
    pointer-events: none;
    -webkit-user-drag: none;
  }

  .base {
    z-index: 2;
    opacity: 0;
    transform: translate3d(0, 0, 0) scale(1);
    filter: brightness(.82);
    animation: baseReveal 3.6s infinite cubic-bezier(.2,.82,.24,1);
  }

  /* 从正中心等比放大 */
  .build {
    position: absolute;
    inset: 0;
    z-index: 3;
    overflow: visible;
    opacity: 0;
    animation: buildOpacity 3.6s infinite cubic-bezier(.2,.82,.24,1);
  }

  .build-core {
    transform-box: fill-box;
    transform-origin: center center;
    transform: scale(.38);
    animation: buildScale 3.6s infinite cubic-bezier(.2,.82,.24,1);
  }

  .build .trace {
    fill: none;
    stroke: rgba(242,245,248,.92);
    stroke-width: 1.45;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 420;
    stroke-dashoffset: 420;
    filter: drop-shadow(0 0 2px rgba(255,255,255,.10));
    animation: traceIn 3.6s infinite cubic-bezier(.2,.82,.24,1);
  }

  .build .anchor {
    fill: rgba(245,247,250,.95);
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center center;
    filter: drop-shadow(0 0 4px rgba(255,255,255,.18));
    animation: pointOut 3.6s infinite cubic-bezier(.2,.82,.24,1);
  }

  .build .p-top    { --dx: 0px;   --dy: -85px; animation-delay: 0s; }
  .build .p-right  { --dx: 86px;  --dy: 0px;   animation-delay: .04s; }
  .build .p-bottom { --dx: 0px;   --dy: 82px;  animation-delay: .08s; }
  .build .p-left   { --dx: -86px; --dy: 0px;   animation-delay: .12s; }

  .stripes {
    position: absolute;
    inset: 0;
    z-index: 4;
    opacity: 0;
    animation: stripesGroup 3.6s infinite cubic-bezier(.22,.9,.24,1);
  }

  .stripe {
    opacity: 0;
    transform: translate3d(0,-4px,0) scale(.992);
  }
  .s1 { animation: stripe1 3.6s infinite cubic-bezier(.22,1,.36,1); }
  .s2 { animation: stripe2 3.6s infinite cubic-bezier(.22,1,.36,1); }
  .s3 { animation: stripe3 3.6s infinite cubic-bezier(.22,1,.36,1); }
  .s4 { animation: stripe4 3.6s infinite cubic-bezier(.22,1,.36,1); }

  @keyframes buildOpacity {
    0%, 8%   { opacity: 0; }
    18%      { opacity: .82; }
    30%      { opacity: 1; }
    42%      { opacity: .96; }
    52%,100% { opacity: 0; }
  }

  @keyframes buildScale {
    0%, 8%   { transform: scale(.38); }
    18%      { transform: scale(.56); }
    30%      { transform: scale(.78); }
    42%      { transform: scale(1); }
    52%,100% { transform: scale(1.01); }
  }

  @keyframes pointOut {
    0%, 6% {
      opacity: 0;
      transform: translate3d(0,0,0) scale(.22);
    }
    16% {
      opacity: .9;
      transform: translate3d(calc(var(--dx) * .28), calc(var(--dy) * .28), 0) scale(.62);
    }
    28% {
      opacity: 1;
      transform: translate3d(calc(var(--dx) * .66), calc(var(--dy) * .66), 0) scale(1);
    }
    40% {
      opacity: .55;
      transform: translate3d(var(--dx), var(--dy), 0) scale(.88);
    }
    52%, 100% {
      opacity: 0;
      transform: translate3d(var(--dx), var(--dy), 0) scale(.7);
    }
  }

  @keyframes traceIn {
    0%, 15% {
      opacity: 0;
      stroke-dashoffset: 420;
    }
    26% {
      opacity: .82;
      stroke-dashoffset: 180;
    }
    38% {
      opacity: .95;
      stroke-dashoffset: 0;
    }
    48% {
      opacity: .18;
      stroke-dashoffset: 0;
    }
    58%, 100% {
      opacity: 0;
      stroke-dashoffset: 0;
    }
  }

  @keyframes baseReveal {
    0%, 35% {
      opacity: 0;
      transform: translate3d(0, 0, 0) scale(1);
      filter: brightness(.78);
    }
    46% {
      opacity: .76;
      transform: translate3d(0, 0, 0) scale(1);
      filter: brightness(.94);
    }
    56% {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
      filter: brightness(1.02);
    }
    88% {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
      filter: brightness(.98);
    }
    100% {
      opacity: .72;
      transform: translate3d(0, 0, 0) scale(1);
      filter: brightness(.90);
    }
  }

  @keyframes stripesGroup {
    0%, 56% { opacity: 0; }
    64% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes stripe1 {
    0%, 62% { opacity: 0; transform: translate3d(0,-4px,0) scale(.992); }
    70% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
    90% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
    100% { opacity: 0; transform: translate3d(0,2px,0) scale(.996); }
  }
  @keyframes stripe2 {
    0%, 66% { opacity: 0; transform: translate3d(0,-4px,0) scale(.992); }
    74% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
    91% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
    100% { opacity: 0; transform: translate3d(0,2px,0) scale(.996); }
  }
  @keyframes stripe3 {
    0%, 70% { opacity: 0; transform: translate3d(0,-4px,0) scale(.992); }
    78% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
    92% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
    100% { opacity: 0; transform: translate3d(0,2px,0) scale(.996); }
  }
  @keyframes stripe4 {
    0%, 74% { opacity: 0; transform: translate3d(0,-4px,0) scale(.992); }
    82% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
    93% { opacity: 1; transform: translate3d(0,0,0) scale(1); }
    100% { opacity: 0; transform: translate3d(0,2px,0) scale(.996); }
  }
</style>
</head>
